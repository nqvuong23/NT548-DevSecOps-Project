controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: pool
                operator: In
                values:
                  - platform
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "platform"
      effect: "NoSchedule"

dashboard:
  enabled: true
  readonly: false

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: pool
                operator: In
                values:
                  - platform
  tolerations:
    - key: "pool"
      operator: "Equal"
      value: "platform"
      effect: "NoSchedule"

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - argorollouts.vuongdevops.io.vn
    paths:
      - /
    pathType: Prefix
    tls: 
    - secretName: argorollouts-tls-secret
      hosts:
      - argorollouts.vuongdevops.io.vn
