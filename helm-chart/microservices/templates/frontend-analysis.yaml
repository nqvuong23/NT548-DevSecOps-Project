{{- if and .Values.frontend.create .Values.frontend.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: frontend-success-rate
  namespace: {{ .Release.Namespace }}
spec:
  metrics:
  - name: success-rate
    interval: 10s
    # The success rate must be 95% or higher
    successCondition: result[0] >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        query: |
          (sum(rate(nginx_ingress_controller_requests{ingress="app", namespace="app", status!~"5.*"}[1m])) or vector(1))
          /
          (sum(rate(nginx_ingress_controller_requests{ingress="app", namespace="app"}[1m])) or vector(1))
{{- end }}
