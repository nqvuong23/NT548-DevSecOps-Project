{{- if and .Values.frontend.create .Values.frontend.rollout.enabled .Values.frontend.rollout.securityGate.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: frontend-security-gate
  namespace: {{ .Release.Namespace }}
spec:
  metrics:
    - name: falco-critical-events
      interval: {{ .Values.frontend.rollout.securityGate.interval | quote }}
      count: {{ .Values.frontend.rollout.securityGate.count }}
      successCondition: result[0] == 0
      failureLimit: {{ .Values.frontend.rollout.securityGate.failureLimit }}
      provider:
        prometheus:
          address: {{ .Values.frontend.rollout.securityGate.prometheusAddress | quote }}
          query: |
            (
              (sum(increase(falcosecurity_falcosidekick_falco_events_total{k8s_ns_name="{{ .Release.Namespace }}",priority_raw=~"critical|error|warning"}[{{ .Values.frontend.rollout.securityGate.lookback }}])) or vector(0))
              +
              (sum(increase(falcosecurity_falcosidekick_falco_events_total{k8s_ns_name="{{ .Release.Namespace }}",priority=~"4|5|6|Critical|Error|Warning"}[{{ .Values.frontend.rollout.securityGate.lookback }}])) or vector(0))
              +
              (sum(increase(falco_events_total{k8s_ns_name="{{ .Release.Namespace }}",priority=~"4|5|6|Critical|Error|Warning"}[{{ .Values.frontend.rollout.securityGate.lookback }}])) or vector(0))
              +
              (sum(increase(falcosidekick_falco_events_total{k8s_ns_name="{{ .Release.Namespace }}",priority=~"4|5|6|Critical|Error|Warning"}[{{ .Values.frontend.rollout.securityGate.lookback }}])) or vector(0))
            )
{{- end }}
