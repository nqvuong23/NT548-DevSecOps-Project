# Scheduling reference for the current GKE node pools.
# platform-pool:    label pool=platform, no active taint
# observation-pool: label pool=observation, no active taint
# app-pool:         label pool=app, taint pool=app:NoSchedule
#
# Do not add platform/observation tolerations unless Terraform is changed to
# taint those pools. The app pool is currently the only tainted pool.

# 1. Platform tools (Jenkins, SonarQube, Argo CD, KEDA, ...)
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: pool
          operator: In
          values:
          - platform

---

# 2. Observation tools (Prometheus, Grafana, Loki, Jaeger, OTel Gateway, ...)
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: pool
          operator: In
          values:
          - observation

---

# 3. Online Boutique application workloads
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: pool
          operator: In
          values:
          - app
tolerations:
- key: "pool"
  operator: "Equal"
  value: "app"
  effect: "NoSchedule"
