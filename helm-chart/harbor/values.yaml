# Minimal Harbor overrides for the NT548 lab environment.
#
# Required secrets must be created before installing this chart:
# - harbor-admin-password with key HARBOR_ADMIN_PASSWORD
# - harbor-secret-key with key secretKey, exactly 16 characters
# - harbor-database with key POSTGRES_PASSWORD
#
# The existing lab database was initialized by Harbor dev images reporting
# v2.16.0. Do not downgrade these images to the chart's v2.15.0 defaults
# unless the Harbor database is reset or migrated to a matching stable release.

observationAffinity: &observationAffinity
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: pool
              operator: In
              values:
                - observation

expose:
  type: ingress
  # Lab-only HTTP ingress. Enable TLS before using Harbor for real credentials.
  tls:
    enabled: false
    certSource: none
  ingress:
    hosts:
      core: harbor.vuongdevops.io.vn
    className: nginx
    annotations:
      ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"

externalURL: http://harbor.vuongdevops.io.vn

updateStrategy:
  type: Recreate

existingSecretAdminPassword: harbor-admin-password
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
harborAdminPassword: ""

secretKey: ""
existingSecretSecretKey: harbor-secret-key

nginx:
  image:
    repository: docker.io/goharbor/nginx-photon
    tag: dev
  affinity: *observationAffinity

portal:
  image:
    repository: docker.io/goharbor/harbor-portal
    tag: dev
  affinity: *observationAffinity

core:
  image:
    repository: docker.io/goharbor/harbor-core
    tag: dev
  affinity: *observationAffinity

jobservice:
  image:
    repository: docker.io/goharbor/harbor-jobservice
    tag: dev
  affinity: *observationAffinity

registry:
  registry:
    image:
      repository: docker.io/goharbor/registry-photon
      tag: dev
  controller:
    image:
      repository: docker.io/goharbor/harbor-registryctl
      tag: dev
  affinity: *observationAffinity

trivy:
  image:
    repository: docker.io/goharbor/trivy-adapter-photon
    tag: dev
  affinity: *observationAffinity

database:
  type: internal
  internal:
    image:
      repository: docker.io/goharbor/harbor-db
      tag: dev
    # Leave empty so the chart reuses the pre-created harbor-database secret.
    password: ""
    affinity: *observationAffinity

redis:
  type: internal
  internal:
    image:
      repository: docker.io/goharbor/valkey-photon
      tag: dev
    affinity: *observationAffinity

exporter:
  image:
    repository: docker.io/goharbor/harbor-exporter
    tag: dev
  affinity: *observationAffinity
