replicas: 1
adminUser: admin
adminPassword: admin

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - grafana.vuongdevops.io.vn
  path: /
  pathType: Prefix
  tls:
    - secretName: grafana-tls-secret
      hosts:
        - grafana.vuongdevops.io.vn

grafana.ini:
  server:
    root_url: https://grafana.vuongdevops.io.vn/

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: true
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway.logging.svc.cluster.local
        editable: true
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '(?:"?(?:traceID|trace_id|traceid)"?[=:]"?)([a-fA-F0-9]{16,32})'
              datasourceUid: jaeger
              url: '${__value.raw}'
      - name: Jaeger
        uid: jaeger
        type: jaeger
        access: proxy
        url: http://jaeger.tracing.svc.cluster.local:16686
        editable: true

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: pool
              operator: In
              values:
                - observation
