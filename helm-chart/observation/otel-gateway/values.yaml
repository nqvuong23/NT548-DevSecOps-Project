fullnameOverride: otel-gateway
mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib

command:
  name: otelcol-contrib

ports:
  otlp:
    enabled: true
  otlp-http:
    enabled: true
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: true
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: pool
              operator: In
              values:
                - observation

config:
  receivers:
    jaeger: null
    zipkin: null
    prometheus: null
    otlp:
      protocols:
        grpc:
          endpoint: ${env:MY_POD_IP}:4317
        http:
          endpoint: ${env:MY_POD_IP}:4318
  processors:
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    batch: {}
    resource:
      attributes:
        - key: deployment.environment
          value: nt548-lab
          action: upsert
  exporters:
    debug: null
    otlp/jaeger:
      endpoint: jaeger.tracing.svc.cluster.local:4317
      tls:
        insecure: true
    otlphttp/loki:
      endpoint: http://loki-gateway.logging.svc.cluster.local/otlp
    prometheus:
      endpoint: ${env:MY_POD_IP}:8889
  service:
    extensions:
      - health_check
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - resource
          - batch
        exporters:
          - otlp/jaeger
      logs:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - resource
          - batch
        exporters:
          - otlphttp/loki
      metrics:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - resource
          - batch
        exporters:
          - prometheus
