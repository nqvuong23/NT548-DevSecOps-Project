# kube-prometheus-stack chart version used by the runbook: 85.2.0

defaultRules:
  create: true

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: nt548-null
      group_by:
        - alertname
        - namespace
        - service
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: nt548-null
          matchers:
            - severity =~ "warning|critical"
    receivers:
      - name: nt548-null
  alertmanagerSpec:
    replicas: 1
    retention: 120h
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: pool
                  operator: In
                  values:
                    - observation

grafana:
  enabled: true
  adminUser: admin
  adminPassword: admin
  replicas: 1
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - grafana.vuongdevops.io.vn
    path: /
    pathType: Prefix
    tls:
      - secretName: grafana-tls-secret
        hosts:
          - grafana.vuongdevops.io.vn
  grafana.ini:
    server:
      root_url: https://grafana.vuongdevops.io.vn/
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: pool
                operator: In
                values:
                  - observation
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      folder: /tmp/dashboards
  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki-gateway.logging.svc.cluster.local
      editable: true
      jsonData:
        derivedFields:
          - name: TraceID
            matcherRegex: '(?:"?(?:traceID|trace_id|traceid)"?[=:]"?)([a-fA-F0-9]{16,32})'
            datasourceUid: jaeger
            url: '${__value.raw}'
    - name: Jaeger
      uid: jaeger
      type: jaeger
      access: proxy
      url: http://jaeger.tracing.svc.cluster.local:16686
      editable: true

prometheusOperator:
  enabled: true
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: pool
                operator: In
                values:
                  - observation
  admissionWebhooks:
    patch:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: pool
                    operator: In
                    values:
                      - observation

prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1
    retention: 7d
    retentionSize: 8GB
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    probeSelectorNilUsesHelmValues: false
    probeSelector: {}
    probeNamespaceSelector: {}
    scrapeConfigSelectorNilUsesHelmValues: false
    scrapeConfigSelector: {}
    scrapeConfigNamespaceSelector: {}
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: pool
                  operator: In
                  values:
                    - observation

kube-state-metrics:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: pool
                operator: In
                values:
                  - observation

prometheus-node-exporter:
  # Node exporter must run on every node, including the tainted app-pool nodes.
  tolerations:
    - operator: Exists
