# jaegertracing/jaeger chart version used by the runbook: 4.8.0
# Jaeger v2 all-in-one defaults to ephemeral in-memory storage when no
# userconfig storage backend is supplied. This is intentional for the lab demo.

jaeger:
  enabled: true
  replicas: 1
  service:
    type: ClusterIP
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: pool
                operator: In
                values:
                  - observation
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
