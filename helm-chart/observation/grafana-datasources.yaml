apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki-gateway.logging.svc.cluster.local
    editable: true
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: '"?(?:traceID|trace_id|traceid)"?[=:]"?([a-fA-F0-9]{16,32})'
          datasourceUid: jaeger
          url: '${__value.raw}'

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger.tracing.svc.cluster.local:16686
    editable: true
