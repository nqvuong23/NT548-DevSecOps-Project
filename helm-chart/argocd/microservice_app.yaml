apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:nqvuong23/NT548-DevSecOps-Project.git
    targetRevision: main
    path: helm-chart/microservices
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
