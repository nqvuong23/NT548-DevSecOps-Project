apiVersion: networking.k8s.io/v1 
kind: Ingress
metadata:
  name: jenkins
  namespace: jenkins
  annotations:
    cert-manager.io/issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - jenkins.vuongdevops.io.vn
    secretName: jenkins-tls-secret
  rules:
  - host: jenkins.vuongdevops.io.vn
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jenkins
            port:
              number: 8080