apiVersion: v1
kind: Pod
metadata:
  name: scenario3-runtime-threat
  namespace: app
  labels:
    app: scenario3-runtime-threat
    scenario: security-scenario-3
spec:
  restartPolicy: Never
  nodeSelector:
    pool: app
  tolerations:
    - key: pool
      operator: Equal
      value: app
      effect: NoSchedule
  containers:
    - name: shell
      image: busybox:1.36
      command:
        - sh
        - -c
        - sleep 1800
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
